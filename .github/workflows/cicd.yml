name: CI/CD — ECR + ECS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write      # OIDC JWT 토큰 발급을 위해 반드시 write 권한 필요
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}    # mylab-backend
  ECS_CLUSTER:    ${{ vars.ECS_CLUSTER }}       # mylab-cluster
  ECS_SERVICE:    ${{ vars.ECS_SERVICE }}       # mylab-backend-service
  CONTAINER_NAME: ${{ vars.CONTAINER_NAME }}    # mylab-backend
  TASK_DEFINITION: .aws/task-definition.json    # 파일 경로 지정

jobs:
  ci:
    name: CI — Build & Push to ECR
    runs-on: ubuntu-latest

    outputs:
      image-uri: ${{ steps.build-push.outputs.image-uri }}
      image-tag: ${{ steps.build-push.outputs.image-tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests  # Maven 빌드 명령어

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # secrets에 AWS_ACCOUNT_ID와 IAM_ROLE_NAME이 저장되어 있어야 함
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.IAM_ROLE_NAME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-CI-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image to ECR
        id: build-push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          TAG="${{ github.run_number }}-${SHORT_SHA}"
          IMAGE_URI="${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${TAG}"

          echo "빌드 이미지: ${IMAGE_URI}"

          docker build \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg GIT_SHA="${SHORT_SHA}" \
            -t ${IMAGE_URI} .

          docker push ${IMAGE_URI}

          # Job 2 (cd) 로 이미지 URI 전달 (GITHUB_OUTPUT 활용)
          echo "image-uri=${IMAGE_URI}" >> $GITHUB_OUTPUT
          echo "image-tag=${TAG}"       >> $GITHUB_OUTPUT

  cd:
    name: CD — Deploy to ECS
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.IAM_ROLE_NAME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-CD-${{ github.run_id }}

      - name: Inject Account ID into task definition
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          # TASK_DEFINITION 환경변수에 정의된 경로의 파일 내 ACCOUNT_ID 문자열 치환
          sed -i "s/ACCOUNT_ID/${ACCOUNT_ID}/g" ${{ env.TASK_DEFINITION }}
          echo "Task Definition ACCOUNT_ID 치환 완료: ${ACCOUNT_ID}"

      - name: Render new task definition with updated image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.TASK_DEFINITION }}
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ needs.ci.outputs.image-uri }}

      - name: Deploy to ECS (Rolling Update)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service:  ${{ env.ECS_SERVICE }}
          cluster:  ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true    # 안정화될 때까지 대기 (권장)

      - name: Print deployment result
        run: |
          echo "=============================="
          echo " 배포 완료"
          echo " 이미지: ${{ needs.ci.outputs.image-uri }}"
          echo " 클러스터: ${{ env.ECS_CLUSTER }}"
          echo " 서비스: ${{ env.ECS_SERVICE }}"
          echo "=============================="
